name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # 当推送到 main 分支时触发
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1 # 匹配你的 pnpm 版本

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 使用 Node.js 20
          cache: 'pnpm' # 使用 pnpm 缓存

      - name: Install dependencies
        run: pnpm install

      - name: Generate types
        run: npx vue-tsc --noEmit # 生成类型文件

      - name: Build
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' # 只在 main 分支部署
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # 构建输出目录
